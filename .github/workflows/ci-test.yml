name: CI Test

on:
  pull_request:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint:ci

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run client typecheck
        run: pnpm --filter @team9/client typecheck

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:cov

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            apps/client/coverage
            apps/server/apps/gateway/coverage
            apps/server/apps/im-worker/coverage
            apps/server/apps/task-worker/coverage
          if-no-files-found: warn

  # Wiki ↔ folder9 integration test. Spins up a real folder9 + postgres via
  # docker compose and runs the opt-in `INTEGRATION=1` suite. Gated by a git
  # diff check so only PRs that touch wiki code pay the ~1-2 min docker cold
  # start.
  #
  # Pulls `ghcr.io/team9ai/folder9:latest` (published by folder9/main's Deploy
  # workflow). Same-org GHCR access uses the built-in GITHUB_TOKEN — no extra
  # secrets. `packages: read` permission is required on the job.
  wiki-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the merge-base of the PR to run `git diff` against, so fetch
          # enough history that `origin/${{ github.base_ref }}` resolves.
          fetch-depth: 0

      - name: Detect wiki-related changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD \
              | grep -E '^(apps/server/apps/gateway/src/wikis/|apps/server/libs/database/src/schemas/wiki/|apps/server/libs/database/migrations/[^/]*wiki|docs/superpowers/specs/[^/]*wiki|\.github/workflows/ci-test\.yml$)' \
              > /tmp/wiki-changes.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Wiki-related files changed:"
            cat /tmp/wiki-changes.txt
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No wiki-related files changed — skipping integration job."
          fi

      - name: Install pnpm
        if: steps.changes.outputs.changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Install Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Log in to GHCR
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start folder9 + postgres via docker compose
        if: steps.changes.outputs.changed == 'true'
        env:
          # Pulls the image published by folder9/main's Deploy workflow.
          # Falls back per docker-compose.yml's default if this var is unset.
          FOLDER9_IMAGE: ghcr.io/team9ai/folder9:latest
        working-directory: apps/server/apps/gateway/src/wikis/__tests__/integration
        run: |
          set -euo pipefail
          # Use --no-build so compose won't try to build from the sibling
          # folder9 checkout (which doesn't exist in CI). If the image isn't
          # pullable the step fails loudly.
          docker compose pull folder9 folder9-postgres
          docker compose up -d --no-build
          # Poll until folder9's /healthz returns 200 OR we hit the 120s cap.
          # The service's own healthcheck retries internally, so if we reach
          # the cap it's a real startup failure and the job should fail.
          echo "Waiting for folder9 to be healthy (max 120s)..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:58080/healthz >/dev/null 2>&1; then
              echo "folder9 is healthy after ${i} poll(s)."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::folder9 did not become healthy within 120s"
              docker compose ps
              docker compose logs --no-color
              exit 1
            fi
            sleep 2
          done
          docker compose ps

      - name: Run wiki integration test
        if: steps.changes.outputs.changed == 'true'
        env:
          INTEGRATION: "1"
          FOLDER9_INTEGRATION_URL: "http://localhost:58080"
        run: pnpm --filter @team9/gateway test -- wiki-folder9.integration

      - name: Print docker logs on failure
        if: failure() && steps.changes.outputs.changed == 'true'
        working-directory: apps/server/apps/gateway/src/wikis/__tests__/integration
        run: docker compose logs --no-color

      - name: Teardown
        if: always() && steps.changes.outputs.changed == 'true'
        working-directory: apps/server/apps/gateway/src/wikis/__tests__/integration
        run: docker compose down -v

  # Ahand persistence + Redis e2e. Boots Postgres and Redis as GitHub Actions
  # service containers (not docker compose — these are commodity images, no
  # custom build needed) and runs the opt-in suite that exercises real DB
  # writes / Redis presence / DB UNIQUE concurrency / transaction rollback.
  # Gated by a diff check so only PRs that touch ahand code pay the ~1 min
  # service-container cold start.
  ahand-persistence-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect ahand-related changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD \
              | grep -E '^(apps/server/apps/gateway/src/ahand/|apps/server/apps/gateway/test/ahand|apps/server/libs/database/src/schemas/im/ahand|apps/server/libs/database/migrations/[^/]*ahand|\.github/workflows/ci-test\.yml$)' \
              > /tmp/ahand-changes.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Ahand-related files changed:"
            cat /tmp/ahand-changes.txt
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No ahand-related files changed — skipping integration job."
          fi

      - name: Install pnpm
        if: steps.changes.outputs.changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Install Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run ahand persistence e2e
        if: steps.changes.outputs.changed == 'true'
        env:
          # Match what the spec's reachability probe / DB bootstrap reads.
          # The spec creates an ephemeral test DB on the admin connection.
          DB_HOST: localhost
          DB_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_ADMIN_DB: postgres
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
        run: pnpm --filter @team9/gateway test:e2e ahand-persistence
